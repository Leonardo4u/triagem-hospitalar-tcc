<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triagem Hospitalar — Cadastro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="header">
    <h1>🏥 Sistema de Triagem Hospitalar</h1>
    <p>Preencha os dados do paciente para iniciar a triagem</p>
  </div>

  <!-- Indicador de passos -->
  <div class="steps">
    <div class="step active">
      <div class="num">1</div> Cadastro
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="num">2</div> Sintomas
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="num">3</div> Resultado
    </div>
  </div>

  <div class="card">

    {% if erro %}
    <div class="alert-error">⚠️ {{ erro }}</div>
    {% endif %}

    <form method="POST" action="/">

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome"
               placeholder="Digite o nome completo" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf"
                 placeholder="000.000.000-00" maxlength="14" required>
        </div>
        <div class="form-group">
          <label for="data_nasc">Data de Nascimento</label>
          <input type="date" id="data_nasc" name="data_nasc" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="sexo">Sexo</label>
          <select id="sexo" name="sexo">
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label for="telefone">Telefone (opcional)</label>
          <input type="text" id="telefone" name="telefone"
                 placeholder="(00) 00000-0000" maxlength="15">
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">
          Próximo → Sintomas
        </button>
      </div>

    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
